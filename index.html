<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCAD Parameter Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.5px;
    }

    .file-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: #2d3148;
      border: 1px solid #3d4268;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #94a3b8;
      transition: background 0.15s, color 0.15s;
    }

    .file-label:hover { background: #363a5c; color: #e2e8f0; }
    .file-label svg { width: 15px; height: 15px; flex-shrink: 0; }

    #file-name {
      font-size: 13px;
      color: #64748b;
      font-style: italic;
    }

    #file-name.loaded { color: #6ee7b7; font-style: normal; font-weight: 500; }

    /* ── MAIN LAYOUT ── */
    .workspace {
      display: grid;
      grid-template-columns: 280px 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── PARAMS PANEL ── */
    .params-panel {
      background: #141720;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    .params-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .params-list::-webkit-scrollbar { width: 6px; }
    .params-list::-webkit-scrollbar-track { background: transparent; }
    .params-list::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: #334155;
      font-size: 13px;
      text-align: center;
      padding: 24px;
    }

    .empty-state svg { width: 40px; height: 40px; color: #2d3148; }

    /* ── PARAM ITEM ── */
    .param-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .param-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .param-name {
      font-size: 13px;
      font-weight: 600;
      color: #93c5fd;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    .param-type {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .type-number  { background: #1e3a5f; color: #60a5fa; }
    .type-boolean { background: #1e3a2f; color: #34d399; }
    .type-string  { background: #3a1e2f; color: #f472b6; }
    .type-vector  { background: #3a2f1e; color: #fb923c; }
    .type-unknown { background: #2d2d2d; color: #94a3b8; }

    /* Number input + range */
    .number-wrapper { display: flex; flex-direction: column; gap: 4px; }

    .number-top { display: flex; align-items: center; gap: 8px; }

    input[type="range"] {
      flex: 1;
      accent-color: #7c3aed;
      cursor: pointer;
      height: 4px;
    }

    input[type="number"] {
      width: 72px;
      background: #1e2235;
      border: 1px solid #3d4268;
      border-radius: 5px;
      color: #e2e8f0;
      padding: 5px 8px;
      font-size: 13px;
      font-family: 'Cascadia Code', monospace;
      text-align: right;
    }

    input[type="number"]:focus { outline: none; border-color: #7c3aed; }

    input[type="text"] {
      width: 100%;
      background: #1e2235;
      border: 1px solid #3d4268;
      border-radius: 5px;
      color: #f472b6;
      padding: 6px 10px;
      font-size: 13px;
      font-family: 'Cascadia Code', monospace;
    }

    input[type="text"]:focus { outline: none; border-color: #7c3aed; }

    /* Boolean toggle */
    .toggle-wrapper { display: flex; align-items: center; gap: 10px; }

    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #2d3148;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #64748b;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #1e3a2f; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #34d399; }

    .toggle-value { font-size: 12px; font-family: 'Cascadia Code', monospace; color: #64748b; }

    /* Vector input */
    .vector-inputs { display: flex; gap: 6px; }
    .vector-inputs input[type="number"] { flex: 1; width: auto; text-align: center; }

    /* Range config */
    .range-config {
      display: flex;
      gap: 4px;
      align-items: center;
      font-size: 11px;
      color: #475569;
    }

    .range-config input[type="number"] { width: 56px; font-size: 11px; padding: 3px 6px; }

    /* ── VIEWER 3D ── */
    .viewer-panel {
      background: #0d1117;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .viewer-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #141720;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    .viewer-header .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      flex: 1;
    }

    .viewer-btn {
      padding: 4px 10px;
      background: #2d3148;
      border: 1px solid #3d4268;
      border-radius: 4px;
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .viewer-btn:hover { background: #363a5c; color: #e2e8f0; }
    .viewer-btn.active { border-color: #a78bfa; color: #a78bfa; }

    .viewer-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .viewer-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .viewer-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #334155;
      font-size: 13px;
      text-align: center;
    }

    .viewer-empty svg { width: 48px; height: 48px; opacity: 0.3; }

    .viewer-status {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      background: #0d111799;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      color: #64748b;
      pointer-events: none;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .viewer-status.warning { color: #fbbf24; }
    .viewer-status.error   { color: #f87171; }

    #render-spinner {
      width: 12px; height: 12px;
      border: 2px solid #3d4268;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    #render-spinner.visible { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CODE PANEL ── */
    .code-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #141720;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    .code-tabs { display: flex; gap: 2px; }

    .tab-btn {
      padding: 4px 12px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn.active { background: #2d3148; color: #e2e8f0; }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #2d3148;
      border: 1px solid #3d4268;
      border-radius: 5px;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover { background: #363a5c; color: #e2e8f0; }
    .copy-btn.copied { border-color: #34d399; color: #34d399; }

    .code-view {
      flex: 1;
      overflow: auto;
      background: #0d1117;
    }

    .code-view::-webkit-scrollbar { width: 8px; height: 8px; }
    .code-view::-webkit-scrollbar-track { background: transparent; }
    .code-view::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }

    pre {
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre;
      min-height: 100%;
    }

    .tok-comment { color: #4b5563; font-style: italic; }
    .tok-keyword { color: #c084fc; }
    .tok-param   { color: #60a5fa; font-weight: 600; }
    .tok-number  { color: #fb923c; }
    .tok-string  { color: #f472b6; }
    .tok-bool    { color: #34d399; }
    .tok-changed { background: #1e3a5f33; border-left: 2px solid #60a5fa; padding-left: 6px; margin-left: -8px; }
    .tok-plain   { color: #94a3b8; }

    /* ── FOOTER ── */
    footer {
      padding: 5px 20px;
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      font-size: 11px;
      color: #334155;
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    footer span { color: #475569; }
    footer strong { color: #64748b; }

    #hidden-file { display: none; }
  </style>
</head>
<body>

<header>
  <h1>⬡ SCAD Parameter Editor</h1>
  <label class="file-label" for="hidden-file">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    Abrir .scad
  </label>
  <input type="file" id="hidden-file" accept=".scad" />
  <span id="file-name">Nenhum arquivo carregado</span>
</header>

<div class="workspace">
  <!-- PARAMS -->
  <aside class="params-panel">
    <div class="panel-header">Parâmetros</div>
    <div class="params-list" id="params-list">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>Carregue um arquivo .scad<br>para editar seus parâmetros</p>
      </div>
    </div>
  </aside>

  <!-- VIEWER 3D -->
  <section class="viewer-panel">
    <div class="viewer-header">
      <span class="panel-title">Visualização 3D</span>
      <button class="viewer-btn" id="wireframe-btn">Wireframe</button>
      <button class="viewer-btn" id="reset-cam-btn">Reset câmera</button>
    </div>
    <div class="viewer-container" id="viewer-container">
      <div class="viewer-empty" id="viewer-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <p>Carregue um arquivo .scad</p>
      </div>
      <div class="viewer-status" id="viewer-status" style="display:none">
        <div id="render-spinner"></div>
        <span id="viewer-status-text"></span>
      </div>
    </div>
  </section>

  <!-- CODE -->
  <section class="code-panel">
    <div class="code-header">
      <div class="code-tabs">
        <button class="tab-btn active" data-tab="modified">Modificado</button>
        <button class="tab-btn" data-tab="original">Original</button>
        <button class="tab-btn" data-tab="diff">Diff</button>
      </div>
      <button class="copy-btn" id="copy-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copiar
      </button>
    </div>
    <div class="code-view">
      <pre id="code-output"><span class="tok-comment">// Carregue um arquivo .scad para visualizar o código aqui.</span></pre>
    </div>
  </section>
</div>

<footer>
  <span><strong>Parâmetros:</strong> <span id="stat-params">0</span></span>
  <span><strong>Linhas:</strong> <span id="stat-lines">0</span></span>
  <span><strong>Modificados:</strong> <span id="stat-changed">0</span></span>
  <span><strong>Avisos:</strong> <span id="stat-warnings">0</span></span>
</footer>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
